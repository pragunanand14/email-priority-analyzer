<!DOCTYPE html>
<html>
<head>
  <title>AI Email Triage Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="dashboard">
    <header>
      <h1>AI Email Dashboard</h1>
      <p>Organized by priority | <span id="totalEmails">0</span> emails analyzed</p>
      <button id="refreshBtn">Refresh</button>
    </header>
    
    <div id="loading" class="loading">Loading emails...</div>
    
    <div id="sections">
      <!-- Dynamic sections populated by JS -->
      <section id="urgent" class="section urgent">
        <h2>🔴 Urgent (High Priority) <span class="count">0</span></h2>
        <div class="cards"></div>
      </section>
      
      <section id="moderate" class="section moderate">
        <h2>🟡 Moderate <span class="count">0</span></h2>
        <div class="cards"></div>
      </section>
      
      <section id="low" class="section low">
        <h2>🟢 Low Priority <span class="count">0</span></h2>
        <div class="cards"></div>
      </section>
      
      <section id="spam" class="section spam">
        <h2>⚫ Spam/Other <span class="count">0</span></h2>
        <div class="cards"></div>
      </section>
    </div>
    
    <div id="emptyState" class="empty hidden">
      <p>No emails analyzed yet.</p>
      <p>Visit your Gmail inbox to start automatic triage!</p>
    </div>
    
    <div id="error" class="error hidden"></div>
  </div>
  
  <script src="dashboard.js"></script>
</body>
</html>
